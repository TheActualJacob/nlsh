name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build nlsh (release)
        run: cargo build --release
        working-directory: nlsh

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nlsh/target/release/nlsh
            nlsh-model/.build/release/nlsh-model
